name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  ruff-lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/

  ruff-format:
    name: Ruff Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Mypy
        run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest

  secret-scanning:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pull trufflehog Docker image
        run: docker pull ghcr.io/trufflesecurity/trufflehog:latest
      - name: Run trufflehog scan
        run: docker run --rm -v "$PWD:/repo" ghcr.io/trufflesecurity/trufflehog:latest git file:///repo --fail --no-update

  notify-on-secret-found:
    name: Notify on secret found
    runs-on: ubuntu-latest
    needs: [secret-scanning]
    if: failure()
    steps:
      - name: Send email alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Boston Needle Map <${{ secrets.NOTIFY_EMAIL }}>
          subject: "⚠️ Secret detected in PR #${{ github.event.pull_request.number }}"
          body: |
            TruffleHog found a potential secret in a pull request.

            PR: ${{ github.event.pull_request.title }}
            Author: ${{ github.event.pull_request.user.login }}
            Link: ${{ github.event.pull_request.html_url }}

            Rotate any exposed credentials immediately, then close or fix the PR.

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    if: always()
    needs: [ruff-lint, ruff-format, mypy, test, secret-scanning]
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.ruff-lint.result }}" != "success" ||
                "${{ needs.ruff-format.result }}" != "success" ||
                "${{ needs.mypy.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.secret-scanning.result }}" != "success" ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
